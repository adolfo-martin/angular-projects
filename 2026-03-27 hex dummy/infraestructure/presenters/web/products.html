<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script type="module">
        import { ProductsController } from "../../controllers/products-controller.js";
        import { RestService } from "../../services/rest-service.js";
        import { ProductsRenderer } from './products-renderer.js';

        await setup();

        async function setup() {
            const service = new RestService();
            const presenter = new ProductsRenderer();
            const controller = new ProductsController(service, presenter);
            controller.retrieveProducts();
        }
    </script>
</head>

<body>
    <h1>Productos</h1>

    <div id="tDivProducts" class="container-products"></div>
</body>

</html>
