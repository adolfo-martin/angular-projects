        document.addEventListener('DOMContentLoaded', async _ => {
            const pokemons = await retrieveAllPokemons()

        async function retrieveAdditionalDataFromSpecies(pokemons) {
            const pokemonsWithAdditionalData = pokemons.map(async pokemon => {
                const url = `https://pokeapi.co/api/v2/pokemon-species/${pokemon.id}`
                const response = await fetch(url)
                const data = await response.json()
                const { base_happiness, capture_rate, is_baby, is_legendary, is_mythical } = data;
                return { ...pokemon, base_happiness, capture_rate, is_baby, is_legendary, is_mythical }
            })

            return Promise.all(pokemonsWithAdditionalData)
        }

        async function retrieveAdditionalDataFromPokemons(pokemons) {
            const pokemonsWithAdditionalData = pokemons.map(async pokemon => {
                const url = `https://pokeapi.co/api/v2/pokemon/${pokemon.id}`
                const response = await fetch(url)
                const data = await response.json()
                const { height, weight, base_experience, sprites: {front_default: image},  types } = data;
                const types2 = types.map(type => type.type.name)
                return { ...pokemon, height, weight, base_experience, image, types: types2 }
            })

            return Promise.all(pokemonsWithAdditionalData)
        }

        async function retrievePokemonsByUrl(url) {
            const response = await fetch(url)
            const data = await response.json()
            return [ data.results, data.next ]
        }

        async function retrieveAllPokemons() {
            const allPokemons = []
            let url = 'https://pokeapi.co/api/v2/pokemon-species/'

            while (url) {
                const [ pokemons, nextUrl ] = await retrievePokemonsByUrl(url)
                const pokemonsNameId = pokemons.map(({ name, url }) => {
                    const numberPattern = /\d+/g;
                    return { name, id: url.match(numberPattern)[1]}
                })
                allPokemons.push(...pokemonsNameId)
                url = nextUrl
            }
            return allPokemons
        }
