<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        table, tr, th, td {
            border: solid 3px darkblue;
            border-collapse: collapse;
            padding: 5px;
        }

        thead, tfoot {
            background-color: darkblue;
            color: white;
            text-transform: uppercase;
        }
    </style>

    <script type="module">
        import { empleados as employees } from './datos_empleados.js';

        employees.forEach(createRowForEmployee);
        const minimalSalary = calculateMinimalSalary(employees);
        document.querySelector('#tThMinimalSalary').textContent = minimalSalary;


        function createRowForEmployee({ nombre: firstname, apellido: lastname, salarioBruto: salary, categoria: position }) {
            const nTbody = document.querySelector('#tTabEmployees>tbody');

            const nTr = document.createElement('tr');
            nTbody.appendChild(nTr);

            const nTdFullname = document.createElement('td');
            nTr.appendChild(nTdFullname);
            nTdFullname.textContent = `${lastname}, ${firstname}`;

            const nTdPosition = document.createElement('td');
            nTr.appendChild(nTdPosition);
            nTdPosition.textContent = position;

            const nTdSalary = document.createElement('td');
            nTr.appendChild(nTdSalary);
            nTdSalary.textContent = salary;
        }

        function calculateMinimalSalary(employees) {
            return employees.reduce((minimal, { salarioBruto: salary }) =>{
                if (!minimal)
                    return salary;
                if (salary < minimal)
                    return salary;
                else
                    return minimal;
            }, undefined);
        }

    </script>
</head>
<body>
    <h1>Empleados</h1>
    <table id="tTabEmployees" border="1">
        <thead>
            <tr>
                <th colspan="3">Empleados</th>
            </tr>
            <tr>
                <th>Nombre</th>
                <th>Puesto</th>
                <th>Salario</th>
            </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
            <tr>
                <th colspan="2">Salario mínimo:</th>
                <th id="tThMinimalSalary">Salario</th>
            </tr>
            <tr>
                <th colspan="2">Salario máximo:</th>
                <th id="tThMaximalSalary">Salario</th>
            </tr>
            <tr>
                <th colspan="2">Salario medio:</th>
                <th id="tThAverageSalary">Salario</th>
            </tr>
        </tfoot>
    </table>
</body>
</html>
