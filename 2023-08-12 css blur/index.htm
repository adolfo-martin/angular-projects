<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 16px;
        }

        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            width: 100vw;
            height: fit-content;
            min-height: 100vh;
            background-color: black;
            color: chartreuse;
            display: grid;
            place-items: center;
        }

        .menu {
            display: flex;
            font-size: 2rem;
            width: 100%;
            justify-content: space-around;
        }

        /* .menu:hover {
            filter: blur(5px);
        } */

        .menu>article {
            flex: 1;
            text-align: center;
        }

        .menu:hover>article:not(:hover) {
            filter: blur(5px);
            /* animation-name: bluring;
            animation-duration: 1000ms;
            animation-timing-function: linear; */
        }

        .menu:hover>article:hover {
            filter: blur(0px);
            /* animation-name: bluring;
            animation-duration: 1000ms;
            animation-timing-function: linear; */
        }

        @keyframes bluring {
            0% {
                filter: blur(0px);
                rotate: 0;
            }

            50% {
                filter: blur(5px);
            }

            100% {
                filter: blur(0px);
                rotate: 1turn;
            }
        }
    </style>
</head>

<body>
    <section class="menu">
        <article>Productos</article>
        <article>Servicios</article>
        <article>Contacto</article>
        <article>Información</article>
    </section>
</body>

</html>
