<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        :root {
            font-size: 16px;
            font-family: Arial, Helvetica, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: coral;
        }

        .button {
            font-size: 4rem;
            font-weight: bold;
            background: transparent;
            color: darkblue;
            padding: 1rem 3rem;
            border-radius: 2.5em;
            position: relative;
            transition: 0.5s;
        }

        .button::before {
            content: "";
            background-color: cornflowerblue;
            /* color: cornflowerblue; */
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 2.5em;
            z-index: -1;
            /* mix-blend-mode: exclusion; */
        }

        .button:hover {
            width: 100%;
        }

        .button:hover::before {
        }
    </style>
</head>
<body>
    <div class="button">Click me!</div>
</body>
</html>
